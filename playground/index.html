<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mvm playground</title>
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="mvm-logo-square-boxed.svg">
  <link rel="apple-touch-icon" href="mvm-logo-square-boxed-512.png">
  <link rel="stylesheet" href="style.css">
</head>
<body data-mode="run">
  <header>
    <h1>
      <img src="mvm-logo.svg" alt="mvm" height="22">
      <span>playground</span>
    </h1>
    <span class="tagline">a fast virtual machine for Go and beyond</span>
    <nav class="links">
      <a href="https://mvm.sh">mvm.sh</a>
      <a href="https://github.com/mvm-sh/mvm">GitHub</a>
    </nav>
    <span id="status" class="status loading">loading wasm…</span>
  </header>

  <main>
    <section class="editor">
      <div class="toolbar">
        <div class="left">
          <label>Mode
            <select id="mode" disabled>
              <option value="run">Run</option>
              <option value="repl">REPL</option>
            </select>
          </label>
          <label class="run-only">Sample
            <select id="sample" disabled>
              <option value="">(loading)</option>
            </select>
          </label>
          <span class="trace-opts">Trace
            <label><input type="checkbox" id="trace-line"> line</label>
            <label><input type="checkbox" id="trace-op"> bytecode</label>
          </span>
        </div>
        <div class="right">
          <span id="parse-stats" class="parse-stats muted run-only" hidden></span>
          <button id="run" disabled>Run ▶</button>
          <button id="repl-reset" class="repl-only" hidden disabled>Reset</button>
        </div>
      </div>
      <div id="tabs" class="tabs" hidden>
        <button type="button" class="tab active run-only" data-source="">Source</button>
      </div>
      <textarea id="src" class="run-only" spellcheck="false" autocomplete="off" autocapitalize="off"
        placeholder="// loading…"></textarea>
      <pre id="viewer" class="viewer" hidden></pre>
      <div id="aux" class="aux" hidden></div>
    </section>
    <section class="output">
      <div class="toolbar"><h2 id="out-title">Output</h2><span id="timing"></span></div>
      <pre id="out"></pre>
      <form id="repl-form" class="repl-only" hidden autocomplete="off">
        <span id="repl-prompt" class="prompt">&gt;</span>
        <input id="repl-input" spellcheck="false" autocapitalize="off" placeholder="Go statement…" disabled>
      </form>
    </section>
  </main>

  <footer>
    <span>Powered by <a href="https://github.com/mvm-sh/mvm">mvm</a> <span id="mvm-version" class="version" title="mvm version / Go version / target"></span></span>
    <span class="local-note">Everything runs in your browser, no server.</span>
  </footer>

  <script src="wasm_exec.js"></script>
  <script src="app.js"></script>
</body>
</html>
